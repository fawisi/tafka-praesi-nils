<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <marker id="ta" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse"><polygon points="0 0,10 3.5,0 7" fill="#00369E"/></marker>
  </defs>

  <rect width="1200" height="600" fill="#FAF6F1"/>

  <!-- Title -->
  <rect x="48" y="36" width="190" height="24" fill="#00369E"/>
  <text x="143" y="52" font-family="IBM Plex Mono,monospace" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">AUS DEM RATGEBER</text>
  <text x="48" y="92" font-family="Montserrat,sans-serif" font-size="32" font-weight="900" fill="#1C1B1A" letter-spacing="-0.8">Die Transformationskurve</text>
  <text x="48" y="116" font-family="Poppins,sans-serif" font-size="15" fill="#5D5C5B">Vier Phasen auf dem Weg zur KI-Kompetenz</text>
  <line x1="48" y1="136" x2="1152" y2="136" stroke="#1C1B1A" stroke-width="2"/>

  <!-- Rising curve background -->
  <path d="M 80 520 Q 300 500,450 420 Q 600 340,750 280 Q 900 220,1140 160" stroke="#00369E" stroke-width="60" fill="none" stroke-linecap="round" opacity="0.06"/>

  <!-- Phase 1: AUFWACHEN -->
  <rect x="70" y="340" width="230" height="200" fill="#FFFFFF" stroke="#1C1B1A" stroke-width="2"/>
  <circle cx="108" cy="370" r="18" fill="#00369E"/>
  <text x="108" y="376" font-family="IBM Plex Mono,monospace" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="136" y="376" font-family="Montserrat,sans-serif" font-size="13" font-weight="700" fill="#1C1B1A" letter-spacing="2">AUFWACHEN</text>
  <line x1="90" y1="394" x2="170" y2="394" stroke="#00369E" stroke-width="2"/>
  <text x="90" y="418" font-family="Poppins,sans-serif" font-size="12" fill="#5D5C5B"><tspan x="90" dy="0">Ich dachte, ich verstehe</tspan><tspan x="90" dy="18">KI. Tue ich nicht.</tspan></text>
  <text x="90" y="484" font-family="IBM Plex Mono,monospace" font-size="10" fill="#9E9D9D"><tspan x="90" dy="0">Teil I: Die neue Realitaet</tspan><tspan x="90" dy="14">Kapitel 1-2</tspan></text>

  <!-- Arrow 1→2 -->
  <line x1="300" y1="400" x2="340" y2="340" stroke="#00369E" stroke-width="2" marker-end="url(#ta)"/>

  <!-- Phase 2: DENKEN -->
  <rect x="348" y="280" width="230" height="200" fill="#FFFFFF" stroke="#1C1B1A" stroke-width="2"/>
  <circle cx="386" cy="310" r="18" fill="#00369E"/>
  <text x="386" y="316" font-family="IBM Plex Mono,monospace" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="414" y="316" font-family="Montserrat,sans-serif" font-size="13" font-weight="700" fill="#1C1B1A" letter-spacing="2">DENKEN</text>
  <line x1="368" y1="334" x2="448" y2="334" stroke="#00369E" stroke-width="2"/>
  <text x="368" y="358" font-family="Poppins,sans-serif" font-size="12" fill="#5D5C5B"><tspan x="368" dy="0">Jetzt sehe ich, wie ich</tspan><tspan x="368" dy="18">anders denken muss.</tspan></text>
  <text x="368" y="424" font-family="IBM Plex Mono,monospace" font-size="10" fill="#9E9D9D"><tspan x="368" dy="0">Teil II: Systemisches Denken</tspan><tspan x="368" dy="14">Kapitel 3-5</tspan></text>

  <!-- Arrow 2→3 -->
  <line x1="578" y1="340" x2="618" y2="280" stroke="#00369E" stroke-width="2" marker-end="url(#ta)"/>

  <!-- Phase 3: ARBEITEN -->
  <rect x="626" y="220" width="230" height="200" fill="#00369E" stroke="#1C1B1A" stroke-width="2"/>
  <circle cx="664" cy="250" r="18" fill="#F4CA00"/>
  <text x="664" y="256" font-family="IBM Plex Mono,monospace" font-size="14" font-weight="700" fill="#1C1B1A" text-anchor="middle">3</text>
  <text x="692" y="256" font-family="Montserrat,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="2">ARBEITEN</text>
  <line x1="646" y1="274" x2="726" y2="274" stroke="#F4CA00" stroke-width="2"/>
  <text x="646" y="298" font-family="Poppins,sans-serif" font-size="12" fill="#D6E4F5"><tspan x="646" dy="0">Eine Arbeitsweise, die sich</tspan><tspan x="646" dy="18">mit der Zeit verbessert.</tspan></text>
  <text x="646" y="364" font-family="IBM Plex Mono,monospace" font-size="10" fill="#7BA3E0"><tspan x="646" dy="0">Teil III: Compound Engineering</tspan><tspan x="646" dy="14">Kapitel 6-8</tspan></text>

  <!-- Arrow 3→4 -->
  <line x1="856" y1="280" x2="896" y2="220" stroke="#00369E" stroke-width="2" marker-end="url(#ta)"/>

  <!-- Phase 4: AUSRICHTEN -->
  <rect x="904" y="160" width="230" height="200" fill="#F4CA00" stroke="#1C1B1A" stroke-width="2"/>
  <circle cx="942" cy="190" r="18" fill="#1C1B1A"/>
  <text x="942" y="196" font-family="IBM Plex Mono,monospace" font-size="14" font-weight="700" fill="#F4CA00" text-anchor="middle">4</text>
  <text x="970" y="196" font-family="Montserrat,sans-serif" font-size="13" font-weight="700" fill="#1C1B1A" letter-spacing="2">AUSRICHTEN</text>
  <line x1="924" y1="214" x2="1004" y2="214" stroke="#1C1B1A" stroke-width="2"/>
  <text x="924" y="238" font-family="Poppins,sans-serif" font-size="12" fill="#5D5C5B"><tspan x="924" dy="0">Fokus und Haltung sind</tspan><tspan x="924" dy="18">wichtiger als jedes Tool.</tspan></text>
  <text x="924" y="304" font-family="IBM Plex Mono,monospace" font-size="10" fill="#5D5C5B"><tspan x="924" dy="0">Teil IV: Fokus</tspan><tspan x="924" dy="14">Kapitel 9-11</tspan></text>

  <!-- Footer -->
  <text x="600" y="568" font-family="IBM Plex Mono,monospace" font-size="12" fill="#5D5C5B" text-anchor="middle" letter-spacing="1">Die Transformationskurve des Lesers — aus dem TAFKA KI-Ratgeber (2026)</text>
  <text x="1152" y="568" font-family="IBM Plex Mono,monospace" font-size="11" fill="#9E9D9D" text-anchor="end">tafka.de</text>
</svg>