<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KI-Betriebssystem Diagram Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #E5E0D5;
      padding: 32px;
    }
    .frame {
      background: white;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      overflow: hidden;
      max-width: 1200px;
      width: 100%;
    }
    svg { display: block; width: 100%; height: auto; }
  </style>
</head>
<body>
  <div class="frame">
    <!-- SVG inline for font inheritance -->
    <object type="image/svg+xml" data="diagram-ki-betriebssystem.svg" style="width:100%;display:block;"></object>
  </div>
</body>
</html>
