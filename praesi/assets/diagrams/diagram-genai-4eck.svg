<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <filter id="sb" x="-5%" y="-5%" width="115%" height="115%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-color="#00369E"/></filter>
    <filter id="sg" x="-5%" y="-5%" width="115%" height="115%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-color="#F4CA00"/></filter>
    <marker id="ah" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse"><polygon points="0 0,10 3.5,0 7" fill="#1C1B1A"/></marker>
  </defs>

  <!-- BG -->
  <rect width="1200" height="800" fill="#FAF6F1"/>

  <!-- Title -->
  <rect x="48" y="40" width="140" height="24" fill="#00369E"/>
  <text x="118" y="56" font-family="IBM Plex Mono,monospace" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">GRUNDLAGEN</text>
  <text x="48" y="100" font-family="Montserrat,sans-serif" font-size="36" font-weight="900" fill="#1C1B1A" letter-spacing="-1">Das GenAI 4-Eck</text>
  <text x="48" y="128" font-family="Poppins,sans-serif" font-size="16" fill="#5D5C5B">Die vier Bausteine jeder KI-Anwendung</text>
  <line x1="48" y1="148" x2="1152" y2="148" stroke="#1C1B1A" stroke-width="2"/>

  <!-- Hub -->
  <circle cx="600" cy="460" r="80" fill="#00369E" stroke="#1C1B1A" stroke-width="2"/>
  <text x="600" y="448" font-family="IBM Plex Mono,monospace" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">DEIN</text>
  <text x="600" y="472" font-family="Montserrat,sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">KI-Ergebnis</text>

  <!-- Card 1: TOOL -->
  <rect x="100" y="200" width="280" height="180" fill="#FFFFFF" stroke="#1C1B1A" stroke-width="2" filter="url(#sb)"/>
  <text x="124" y="230" font-family="IBM Plex Mono,monospace" font-size="11" font-weight="700" fill="#00369E" letter-spacing="1">[01]</text>
  <circle cx="350" cy="224" r="14" fill="#D6E4F5"/>
  <text x="350" y="229" font-family="Poppins,sans-serif" font-size="12" fill="#00369E" text-anchor="middle">&#9881;</text>
  <text x="124" y="264" font-family="IBM Plex Mono,monospace" font-size="22" font-weight="700" fill="#1C1B1A" letter-spacing="4">TOOL</text>
  <line x1="124" y1="278" x2="200" y2="278" stroke="#00369E" stroke-width="3"/>
  <text x="124" y="300" font-family="Poppins,sans-serif" font-size="13" fill="#5D5C5B"><tspan x="124" dy="0">Die Plattform oder Software.</tspan><tspan x="124" dy="20">ChatGPT, Claude, n8n, Midjourney.</tspan></text>

  <!-- Card 2: LLM -->
  <rect x="820" y="200" width="280" height="180" fill="#FFFFFF" stroke="#1C1B1A" stroke-width="2" filter="url(#sb)"/>
  <text x="844" y="230" font-family="IBM Plex Mono,monospace" font-size="11" font-weight="700" fill="#00369E" letter-spacing="1">[02]</text>
  <circle cx="1070" cy="224" r="14" fill="#D6E4F5"/>
  <text x="1070" y="229" font-family="Poppins,sans-serif" font-size="12" fill="#00369E" text-anchor="middle">&#9733;</text>
  <text x="844" y="264" font-family="IBM Plex Mono,monospace" font-size="22" font-weight="700" fill="#1C1B1A" letter-spacing="4">LLM</text>
  <line x1="844" y1="278" x2="910" y2="278" stroke="#00369E" stroke-width="3"/>
  <text x="844" y="300" font-family="Poppins,sans-serif" font-size="13" fill="#5D5C5B"><tspan x="844" dy="0">Das Sprachmodell im Hintergrund.</tspan><tspan x="844" dy="20">GPT-4, Claude, Gemini, Llama.</tspan></text>

  <!-- Card 3: PROMPT -->
  <rect x="100" y="540" width="280" height="180" fill="#FFFFFF" stroke="#1C1B1A" stroke-width="2" filter="url(#sg)"/>
  <text x="124" y="570" font-family="IBM Plex Mono,monospace" font-size="11" font-weight="700" fill="#B8960A" letter-spacing="1">[03]</text>
  <circle cx="350" cy="564" r="14" fill="#FEF7D6"/>
  <text x="350" y="569" font-family="Poppins,sans-serif" font-size="12" fill="#B8960A" text-anchor="middle">&#9998;</text>
  <text x="124" y="604" font-family="IBM Plex Mono,monospace" font-size="22" font-weight="700" fill="#1C1B1A" letter-spacing="4">PROMPT</text>
  <line x1="124" y1="618" x2="220" y2="618" stroke="#F4CA00" stroke-width="3"/>
  <text x="124" y="640" font-family="Poppins,sans-serif" font-size="13" fill="#5D5C5B"><tspan x="124" dy="0">Dein Auftrag an die KI. Je praeziser</tspan><tspan x="124" dy="20">die Anweisung, desto besser.</tspan></text>

  <!-- Card 4: KONTEXT -->
  <rect x="820" y="540" width="280" height="180" fill="#FFFFFF" stroke="#1C1B1A" stroke-width="2" filter="url(#sg)"/>
  <text x="844" y="570" font-family="IBM Plex Mono,monospace" font-size="11" font-weight="700" fill="#B8960A" letter-spacing="1">[04]</text>
  <circle cx="1070" cy="564" r="14" fill="#FEF7D6"/>
  <text x="1070" y="569" font-family="Poppins,sans-serif" font-size="12" fill="#B8960A" text-anchor="middle">&#9776;</text>
  <text x="844" y="604" font-family="IBM Plex Mono,monospace" font-size="22" font-weight="700" fill="#1C1B1A" letter-spacing="4">KONTEXT</text>
  <line x1="844" y1="618" x2="950" y2="618" stroke="#F4CA00" stroke-width="3"/>
  <text x="844" y="640" font-family="Poppins,sans-serif" font-size="13" fill="#5D5C5B"><tspan x="844" dy="0">Dein Wissen, Daten, Dokumente.</tspan><tspan x="844" dy="20">Treibstoff fuer relevante Ergebnisse.</tspan></text>

  <!-- Connectors -->
  <line x1="380" y1="310" x2="535" y2="405" stroke="#1C1B1A" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="820" y1="310" x2="665" y2="405" stroke="#1C1B1A" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="380" y1="610" x2="535" y2="515" stroke="#1C1B1A" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="820" y1="610" x2="665" y2="515" stroke="#1C1B1A" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Footer -->
  <text x="600" y="770" font-family="IBM Plex Mono,monospace" font-size="12" fill="#5D5C5B" text-anchor="middle" letter-spacing="1">Wer alle vier Bausteine versteht, kontrolliert seine KI-Ergebnisse.</text>
  <text x="1152" y="770" font-family="IBM Plex Mono,monospace" font-size="11" fill="#9E9D9D" text-anchor="end">tafka.de</text>
</svg>