<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img" aria-labelledby="ki-os-title ki-os-desc">

  <defs>
    <marker id="arr-ink" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16110D"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1F4E79"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2D6B3F"/>
    </marker>
  </defs>

  <title id="ki-os-title">Das KI-Betriebssystem</title>
  <desc id="ki-os-desc">Drei-Layer KI-Betriebssystem: Agenten-Layer, Skill Executor mit Skill-, Kontext- und Governance-Layer, sowie Feedback-Layer mit Inputs und Outputs</desc>

  <!-- Background + outer border -->
  <rect width="1200" height="560" fill="#F4ECD8"/>
  <rect x="1" y="1" width="1198" height="558" fill="none" stroke="#16110D" stroke-width="1.5"/>

  <!-- Header label + subtitle -->
  <text x="20" y="22" font-family="IBM Plex Mono, monospace" font-size="10" letter-spacing="1.6" fill="#6B6155" font-weight="600">DIAGR · XX · KI-BETRIEBSSYSTEM</text>
  <text x="20" y="44" font-family="Archivo Black, Arial Black, sans-serif" font-size="14" fill="#16110D">Agenten. Skills. Kontext. Governance. Lernen.</text>

  <!-- ═══════════════════════════════════════════════
       INPUTS Box  x=20  y=58  w=130  h=372
       ═══════════════════════════════════════════════ -->
  <g id="inputs" data-label="Inputs">
    <rect x="20" y="58" width="130" height="372" fill="#16110D"/>
    <text x="85" y="80" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" letter-spacing="1.4" fill="#F4C61F" font-weight="700">INPUTS</text>
    <line x1="28" y1="88" x2="142" y2="88" stroke="#3A322B" stroke-width="1"/>

    <!-- Item 1: Aufgaben -->
    <rect x="28" y="110" width="9" height="9" fill="#F4C61F"/>
    <text x="44" y="120" font-family="Inter, sans-serif" font-size="11" fill="#FAF4E2" font-weight="500">Aufgaben</text>

    <!-- Item 2: Meetings -->
    <rect x="28" y="178" width="9" height="9" fill="#F4C61F"/>
    <text x="44" y="188" font-family="Inter, sans-serif" font-size="11" fill="#FAF4E2" font-weight="500">Meetings</text>

    <!-- Item 3: Nachrichten -->
    <rect x="28" y="246" width="9" height="9" fill="#F4C61F"/>
    <text x="44" y="256" font-family="Inter, sans-serif" font-size="11" fill="#FAF4E2" font-weight="500">Nachrichten</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       OUTPUTS Box  x=1050  y=58  w=130  h=372
       ═══════════════════════════════════════════════ -->
  <g id="outputs" data-label="Outputs">
    <rect x="1050" y="58" width="130" height="372" fill="#16110D"/>
    <text x="1115" y="80" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" letter-spacing="1.4" fill="#F4C61F" font-weight="700">OUTPUTS</text>
    <line x1="1058" y1="88" x2="1172" y2="88" stroke="#3A322B" stroke-width="1"/>

    <text x="1065" y="128" font-family="Inter, sans-serif" font-size="10" fill="#F4C61F">&#8594;</text>
    <text x="1078" y="128" font-family="Inter, sans-serif" font-size="10.5" fill="#FAF4E2">Skalierbare</text>
    <text x="1065" y="143" font-family="Inter, sans-serif" font-size="10.5" fill="#FAF4E2">   Ergebnisse</text>

    <text x="1065" y="206" font-family="Inter, sans-serif" font-size="10" fill="#F4C61F">&#8594;</text>
    <text x="1078" y="206" font-family="Inter, sans-serif" font-size="10.5" fill="#FAF4E2">Dokumentiertes</text>
    <text x="1065" y="221" font-family="Inter, sans-serif" font-size="10.5" fill="#FAF4E2">   Wissen</text>

    <text x="1065" y="290" font-family="Inter, sans-serif" font-size="10" fill="#F4C61F">&#8594;</text>
    <text x="1078" y="290" font-family="Inter, sans-serif" font-size="10.5" fill="#FAF4E2">Kontinuierliche</text>
    <text x="1065" y="305" font-family="Inter, sans-serif" font-size="10.5" fill="#FAF4E2">   Verbesserung</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       LAYER 1 · Agenten-Layer
       x=165  y=58  w=875  h=82
       ═══════════════════════════════════════════════ -->
  <g id="layer-1" data-label="Layer 1 Agenten-Layer">
    <rect x="165" y="58" width="875" height="82" fill="#16110D"/>

    <!-- Yellow label badge -->
    <rect x="175" y="68" width="76" height="24" fill="#F4C61F"/>
    <text x="178" y="84" font-family="IBM Plex Mono, monospace" font-size="10" letter-spacing="1.2" fill="#16110D" font-weight="700">LAYER 1</text>

    <!-- Title -->
    <text x="263" y="85" font-family="Archivo Black, Arial Black, sans-serif" font-size="17" fill="#FAF4E2">Agenten-Layer</text>

    <!-- Blue pills: 3 agent types -->
    <rect x="540" y="67" width="88" height="24" rx="12" fill="#1F4E79"/>
    <text x="584" y="83" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" letter-spacing="0.8" fill="#FAF4E2" font-weight="700">OS-Agent</text>

    <rect x="638" y="67" width="140" height="24" rx="12" fill="#1F4E79"/>
    <text x="708" y="83" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" letter-spacing="0.8" fill="#FAF4E2" font-weight="700">Agenten-Pipeline</text>

    <rect x="788" y="67" width="148" height="24" rx="12" fill="#1F4E79"/>
    <text x="862" y="83" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" letter-spacing="0.8" fill="#FAF4E2" font-weight="700">Standalone Agents</text>

    <!-- Subtext -->
    <text x="178" y="126" font-family="Inter, sans-serif" font-size="11" fill="#8A8070">Alle drei sind bewusst »dumm« — die Intelligenz steckt im System darunter.</text>
  </g>

  <!-- Down arrow Layer 1 → Layer 2 -->
  <line x1="603" y1="140" x2="603" y2="154" stroke="#16110D" stroke-width="2" marker-end="url(#arr-ink)"/>

  <!-- ═══════════════════════════════════════════════
       LAYER 2 · Skill Executor
       x=165  y=157  w=875  h=182
       ═══════════════════════════════════════════════ -->
  <g id="layer-2" data-label="Layer 2 Skill Executor">
    <rect x="165" y="157" width="875" height="182" fill="#16110D"/>

    <!-- Yellow label badge -->
    <rect x="175" y="167" width="76" height="24" fill="#F4C61F"/>
    <text x="178" y="183" font-family="IBM Plex Mono, monospace" font-size="10" letter-spacing="1.2" fill="#16110D" font-weight="700">LAYER 2</text>

    <!-- Title -->
    <text x="263" y="183" font-family="Archivo Black, Arial Black, sans-serif" font-size="17" fill="#FAF4E2">Skill Executor</text>

    <!-- Green pills -->
    <rect x="560" y="166" width="146" height="24" rx="12" fill="#2D6B3F"/>
    <text x="633" y="182" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" letter-spacing="0.8" fill="#FAF4E2" font-weight="700">Semantic Matching</text>

    <rect x="716" y="166" width="122" height="24" rx="12" fill="#2D6B3F"/>
    <text x="777" y="182" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" letter-spacing="0.8" fill="#FAF4E2" font-weight="700">SOP Execution</text>

    <rect x="848" y="166" width="150" height="24" rx="12" fill="#2D6B3F"/>
    <text x="923" y="182" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" letter-spacing="0.8" fill="#FAF4E2" font-weight="700">Human-in-the-Loop</text>

    <!-- Subtext -->
    <text x="178" y="205" font-family="Inter, sans-serif" font-size="11" fill="#8A8070">Findet, lädt und führt Skills regelbasiert aus.</text>

    <!-- Sub-box 1: Skill-Layer  x=178 y=216 w=277 h=110 -->
    <rect x="178" y="216" width="277" height="110" fill="#1A1714" stroke="#3A322B" stroke-width="1"/>
    <text x="192" y="236" font-family="IBM Plex Mono, monospace" font-size="10" letter-spacing="1.2" fill="#FAF4E2" font-weight="700">Skill-Layer</text>
    <line x1="178" y1="244" x2="455" y2="244" stroke="#3A322B" stroke-width="1"/>
    <text x="192" y="263" font-family="Inter, sans-serif" font-size="11" fill="#B0A68A">Was kann die</text>
    <text x="192" y="279" font-family="Inter, sans-serif" font-size="11" fill="#B0A68A">Organisation?</text>
    <text x="192" y="314" font-family="IBM Plex Mono, monospace" font-size="9" fill="#6B6155" letter-spacing="0.8">Aktive Skills</text>

    <!-- Sub-box 2: Kontext-Layer  x=465 y=216 w=277 h=110 -->
    <rect x="465" y="216" width="277" height="110" fill="#1A1714" stroke="#3A322B" stroke-width="1"/>
    <text x="479" y="236" font-family="IBM Plex Mono, monospace" font-size="10" letter-spacing="1.2" fill="#FAF4E2" font-weight="700">Kontext-Layer</text>
    <line x1="465" y1="244" x2="742" y2="244" stroke="#3A322B" stroke-width="1"/>
    <text x="479" y="263" font-family="Inter, sans-serif" font-size="11" fill="#B0A68A">Was weiss die</text>
    <text x="479" y="279" font-family="Inter, sans-serif" font-size="11" fill="#B0A68A">Organisation?</text>
    <text x="479" y="314" font-family="IBM Plex Mono, monospace" font-size="9" fill="#6B6155" letter-spacing="0.8">3-Stufen-Hierarchie</text>

    <!-- Sub-box 3: Governance-Layer  x=752 y=216 w=277 h=110 -->
    <rect x="752" y="216" width="277" height="110" fill="#1A1714" stroke="#3A322B" stroke-width="1"/>
    <text x="766" y="236" font-family="IBM Plex Mono, monospace" font-size="10" letter-spacing="1.2" fill="#FAF4E2" font-weight="700">Governance-Layer</text>
    <line x1="752" y1="244" x2="1029" y2="244" stroke="#3A322B" stroke-width="1"/>
    <text x="766" y="263" font-family="Inter, sans-serif" font-size="11" fill="#B0A68A">Welche Regeln</text>
    <text x="766" y="279" font-family="Inter, sans-serif" font-size="11" fill="#B0A68A">gelten?</text>
    <text x="766" y="314" font-family="IBM Plex Mono, monospace" font-size="9" fill="#6B6155" letter-spacing="0.8">3 Autonomie-Level</text>
  </g>

  <!-- Down arrow Layer 2 → Layer 3 -->
  <line x1="603" y1="339" x2="603" y2="353" stroke="#16110D" stroke-width="2" marker-end="url(#arr-ink)"/>

  <!-- ═══════════════════════════════════════════════
       LAYER 3 · Feedback-Layer
       x=165  y=355  w=875  h=75
       ═══════════════════════════════════════════════ -->
  <g id="layer-3" data-label="Layer 3 Feedback-Layer">
    <rect x="165" y="355" width="875" height="75" fill="#2D6B3F"/>

    <!-- Yellow label badge -->
    <rect x="175" y="365" width="76" height="24" fill="#F4C61F"/>
    <text x="178" y="381" font-family="IBM Plex Mono, monospace" font-size="10" letter-spacing="1.2" fill="#16110D" font-weight="700">LAYER 3</text>

    <!-- Title -->
    <text x="263" y="381" font-family="Archivo Black, Arial Black, sans-serif" font-size="17" fill="#FAF4E2">Feedback-Layer</text>

    <!-- Dark green pills with lighter border -->
    <rect x="652" y="365" width="100" height="24" rx="12" fill="#1D4E2A" stroke="#4A9B5A" stroke-width="1"/>
    <text x="702" y="381" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" letter-spacing="0.8" fill="#FAF4E2" font-weight="700">Systemisch</text>

    <rect x="762" y="365" width="90" height="24" rx="12" fill="#1D4E2A" stroke="#4A9B5A" stroke-width="1"/>
    <text x="807" y="381" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" letter-spacing="0.8" fill="#FAF4E2" font-weight="700">Punktuell</text>

    <rect x="862" y="365" width="98" height="24" rx="12" fill="#1D4E2A" stroke="#4A9B5A" stroke-width="1"/>
    <text x="911" y="381" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" letter-spacing="0.8" fill="#FAF4E2" font-weight="700">Periodisch</text>

    <!-- Subtext -->
    <text x="178" y="416" font-family="Inter, sans-serif" font-size="11" fill="#A8C9A8">Lernschleife zurück ins System.</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       Feedback Loop Bar
       x=165  y=444  w=875  h=44
       ═══════════════════════════════════════════════ -->
  <g id="feedback-bar" data-label="Feedback Loop">
    <rect x="165" y="444" width="875" height="44" fill="#F4ECD8" stroke="#16110D" stroke-width="1.5"/>
    <text x="184" y="470" font-family="IBM Plex Mono, monospace" font-size="10" letter-spacing="1.4" fill="#16110D" font-weight="700">Feedback Loop</text>
    <text x="310" y="470" font-family="Inter, sans-serif" font-size="12" fill="#3A322B">Feedback erfassen</text>
    <line x1="446" y1="466" x2="466" y2="466" stroke="#16110D" stroke-width="1.5" marker-end="url(#arr-ink)"/>
    <text x="476" y="470" font-family="Inter, sans-serif" font-size="12" fill="#3A322B">Skill patchen</text>
    <line x1="578" y1="466" x2="598" y2="466" stroke="#16110D" stroke-width="1.5" marker-end="url(#arr-ink)"/>
    <text x="608" y="470" font-family="Inter, sans-serif" font-size="12" fill="#3A322B">Qualität steigt</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       Connectors
       ═══════════════════════════════════════════════ -->
  <g id="connectors">
    <!-- Blue arrow: INPUTS right edge → Layer 2 left edge (y=244) -->
    <line x1="150" y1="244" x2="162" y2="244" stroke="#1F4E79" stroke-width="2" marker-end="url(#arr-blue)"/>

    <!-- Green feedback arc: Layer 3 left → up → Layer 2 left (y=254) -->
    <path d="M 165 392 L 148 392 L 148 254 L 162 254"
          fill="none" stroke="#2D6B3F" stroke-width="2" marker-end="url(#arr-green)"/>
  </g>

</svg>
